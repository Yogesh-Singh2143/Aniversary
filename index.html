
<!DOCTYPE html>
<html>
<head>
<title>मम्मी पापा को सालगिरह की शुभकामनाएँ ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    overflow:hidden;
}

.card{
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    position:relative;
    z-index:2;
}

h1{
    color:#ff4d6d;
}

.slideshow img{
    width:300px;
    height:auto;
    border-radius:12px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#e6004c;
}

#message{
    display:none;
    margin-top:20px;
    font-weight:bold;
    color:#444;
}

.heart{
    position:absolute;
    top:-10px;
    color:#ff4d6d;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh);
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="sound.mp4" type="audio/mp4">
</audio>

<div class="card">

<h1>सालगिरह मुबारक हो ❤️</h1>

<div class="slideshow">
<img id="photo" src="photo1.jpeg">
</div>

<p>
उस प्यार का जश्न जो हमारे परिवार की नींव है।
</p>

<button onclick="showMessage()">संदेश देखने के लिए क्लिक करें 💌</button>

<p id="message">
मम्मी और पापा ❤️<br><br>
आप दोनों का प्यार हमारे परिवार की सबसे बड़ी ताकत है।  
आपने हमें हमेशा संभाला और सही रास्ता दिखाया।  
भगवान से यही दुआ है कि आप दोनों हमेशा खुश रहें।  
शादी की सालगिरह की ढेर सारी शुभकामनाएँ ❤️
</p>

</div>

<script>

let photos = [
"photo1.jpeg",
"photo2.jpeg",
"photo3.jpeg",
"photo4.jpeg",
"photo5.jpeg"
]

let index = 0

setInterval(function(){

index++

if(index >= photos.length){
index = 0
}

document.getElementById("photo").src = photos[index]

},2500)

function showMessage(){
document.getElementById("message").style.display="block"
}

for(let i=0;i<30;i++){

let heart = document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*5)+"s"
heart.style.fontSize=(10+Math.random()*20)+"px"

document.body.appendChild(heart)

}

</script>

</body>
</html>
